<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="ISO-8859-1">
    <title>Agregar Ingredientes</title>
</head>
<body>
    <h1>Agregar Ingredientes</h1>
    <p>En esta sección puedes añadir ingredientes a tu receta utilizando una selección predefinida.</p>
    <p><strong>Pasos:</strong></p>
    <ol>
        <li>Haz clic en el botón <em>Agregar ingredientes</em>.</li>
        <li>Selecciona los ingredientes deseados de la lista.</li>
        <li>Presiona <em>Aceptar</em> para añadir los ingredientes a tu receta.</li>
    </ol>

    <img src="images/ingredientes.png" alt="Ejemplo de postre" style="width:300px; height:auto;">
</body>
</html>
